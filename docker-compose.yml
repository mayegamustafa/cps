services:
  db:
    image: postgres:16-alpine
    container_name: cps-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cps
      POSTGRES_PASSWORD: cps_password
      POSTGRES_DB: cityparents
    ports:
      - '5432:5432'
    volumes:
      - cps_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cps -d cityparents']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cps-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cps:cps_password@db:5432/cityparents?schema=public
      API_PORT: 4000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: cps-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '3000:3000'

volumes:
  cps_pgdata:
